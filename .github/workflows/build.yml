name: Build landingpage

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v6.3.0
      with:
        python-version: 3.12
        cache: pip
        pip-install: -r requirements.txt

    - name: Cache
      uses: actions/cache@v5.1.0
      with:
        key: ${{ hashFiles('bin/*') }}
        path: |
          assets/js/tailwinds.js
          assets/fonts/fontawesome.zip
          assets/fonts/source-sans
          assets/tailwindcss-linux
          assets/js/chart.js

    - name: Build
      run: |
        bin/regenerate.sh

    - name: Push the artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Built landingpage
        path: dist
